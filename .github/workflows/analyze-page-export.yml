name: Analyze page export

on:
  workflow_dispatch:
  push:
    paths:
      - "codex-analysis/latest-page-export.txt"
      - "scripts/analyze-page-export.mjs"
      - ".github/workflows/analyze-page-export.yml"

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    env:
      INPUT_FILE: codex-analysis/latest-page-export.txt
      OUTPUT_FILE: codex-analysis/latest-page-export-analysis.md
      ANALYSIS_MODEL: gpt-4.1-mini
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Analyze latest export
        run: node scripts/analyze-page-export.mjs

      - name: Commit analysis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-analysis/latest-page-export-analysis.md
          if git diff --cached --quiet; then
            echo "No analysis changes to commit."
          else
            git commit -m "Update latest page export analysis"
            git push
          fi
